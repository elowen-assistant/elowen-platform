apiVersion: v1
kind: Service
metadata:
  name: arangodb
spec:
  selector:
    app: arangodb
  ports:
    - name: http
      port: 8529
      targetPort: 8529
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: arangodb
spec:
  serviceName: arangodb
  replicas: 1
  selector:
    matchLabels:
      app: arangodb
  template:
    metadata:
      labels:
        app: arangodb
    spec:
      containers:
        - name: arangodb
          image: arangodb:3.12
          ports:
            - containerPort: 8529
          env:
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elowen-secrets
                  key: ARANGO_ROOT_PASSWORD
          volumeMounts:
            - name: arangodb-data
              mountPath: /var/lib/arangodb3
            - name: arangodb-apps
              mountPath: /var/lib/arangodb3-apps
  volumeClaimTemplates:
    - metadata:
        name: arangodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: arangodb-apps
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
