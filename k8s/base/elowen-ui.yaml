apiVersion: v1
kind: Service
metadata:
  name: elowen-ui
spec:
  selector:
    app: elowen-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elowen-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elowen-ui
  template:
    metadata:
      labels:
        app: elowen-ui
    spec:
      containers:
        - name: elowen-ui
          image: ghcr.io/elowen-assistant/elowen-ui:latest
          ports:
            - containerPort: 3000
