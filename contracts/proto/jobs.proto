syntax = "proto3";

package elowen.jobs.v1;

import "google/protobuf/timestamp.proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_PROBING = 2;
  JOB_STATUS_DISPATCHED = 3;
  JOB_STATUS_ACCEPTED = 4;
  JOB_STATUS_RUNNING = 5;
  JOB_STATUS_AWAITING_APPROVAL = 6;
  JOB_STATUS_COMPLETED = 7;
  JOB_STATUS_FAILED = 8;
  JOB_STATUS_CANCELLED = 9;
}

enum JobResult {
  JOB_RESULT_UNSPECIFIED = 0;
  JOB_RESULT_SUCCESS = 1;
  JOB_RESULT_PARTIAL = 2;
  JOB_RESULT_FAILURE = 3;
}

enum FailureClass {
  FAILURE_CLASS_UNSPECIFIED = 0;
  FAILURE_CLASS_NONE = 1;
  FAILURE_CLASS_VALIDATION = 2;
  FAILURE_CLASS_EXECUTION = 3;
  FAILURE_CLASS_TEST = 4;
  FAILURE_CLASS_INFRASTRUCTURE = 5;
  FAILURE_CLASS_TIMEOUT = 6;
}

message Job {
  string id = 1;
  string short_id = 2;
  string thread_id = 3;
  string title = 4;
  JobStatus status = 5;
  JobResult result = 6;
  FailureClass failure_class = 7;
  string repo_name = 8;
  string device_id = 9;
  string branch_name = 10;
  string base_branch = 11;
  string parent_job_id = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message JobDispatch {
  string job_id = 1;
  string thread_id = 2;
  string device_id = 3;
  string repo_name = 4;
  string base_branch = 5;
  string branch_name = 6;
  string request_text = 7;
  repeated string context_summary_ids = 8;
}

message JobAccepted {
  string job_id = 1;
  string device_id = 2;
  google.protobuf.Timestamp accepted_at = 3;
}

message JobStarted {
  string job_id = 1;
  string worktree_path = 2;
  google.protobuf.Timestamp started_at = 3;
}

message JobCompleted {
  string job_id = 1;
  JobResult result = 2;
  FailureClass failure_class = 3;
  string summary_id = 4;
  google.protobuf.Timestamp completed_at = 5;
}
