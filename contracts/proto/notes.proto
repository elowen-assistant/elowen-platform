syntax = "proto3";

package elowen.notes.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message NoteRecord {
  string note_id = 1;
  string title = 2;
  string slug = 3;
  string summary = 4;
  repeated string tags = 5;
  repeated string aliases = 6;
  string note_type = 7;
  string source_kind = 8;
  string source_id = 9;
  string current_revision_id = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message NoteAuthor {
  string actor_type = 1;
  string actor_id = 2;
  string display_name = 3;
}

message NoteSourceReference {
  string source_kind = 1;
  string source_id = 2;
  string label = 3;
}

message NoteRevision {
  string revision_id = 1;
  string note_id = 2;
  int32 version = 3;
  string summary = 4;
  string body_markdown = 5;
  google.protobuf.Struct frontmatter = 6;
  google.protobuf.Timestamp created_at = 7;
  string previous_revision_id = 8;
  NoteAuthor authored_by = 9;
  repeated NoteSourceReference source_references = 10;
}

message NoteDetail {
  NoteRecord note = 1;
  NoteRevision revision = 2;
}

message SearchNotesRequest {
  string q = 1;
  int32 limit = 2;
  string source_kind = 3;
  string source_id = 4;
}

message PromoteNoteRequest {
  string note_id = 1;
  string source_kind = 2;
  string source_id = 3;
  string title = 4;
  string slug = 5;
  string summary = 6;
  string body_markdown = 7;
  repeated string tags = 8;
  repeated string aliases = 9;
  string note_type = 10;
  google.protobuf.Struct frontmatter = 11;
  NoteAuthor authored_by = 12;
  repeated NoteSourceReference source_references = 13;
}
